name: Build and push

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: "The version of the CRG Scoreboard to build and push. (e.g: v2025.5)"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          build-args: |
            version=${{ inputs.version }}
          platforms: linux/amd64,linux/arm64,linux/x86_64
          push: true
          tags: nashvillerollerderby/crg-scoreboard:latest,nashvillerollerderby/crg-scoreboard:${{ inputs.version }}